<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>{% block staff_title %}{% endblock %}</title>
        <style>
            {% include "books/staff_style.css" %}
        </style>
    </head>
    <body>
        <div class="page-wrapper">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <nav class="staff-nav">
                <a href="{% url 'books:book-create' %}" class="staff-nav-link{% if request.resolver_match.url_name == 'book-create' %} active{% endif %}">Add one book</a>
                <a href="{% url 'books:batch-upload' %}" class="staff-nav-link{% if request.resolver_match.url_name == 'batch-upload' %} active{% endif %}">Add many books</a>
                <a href="/admin/" class="staff-nav-link">Django Admin</a>
                <a href="{% url 'books:book-list' %}" class="staff-nav-link">Public Site</a>
            </nav>

            <main class="staff-main">
                {% block staff_content %}
                {% endblock staff_content %}
            </main>
        </div>

        {% block scripts %}
        {% endblock scripts %}
    </body>
</html>
